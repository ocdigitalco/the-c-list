<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Checklist² · Logo + Color</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #F1EDE4; }
  body { font-family: "Inter", system-ui, sans-serif; color: #0E0E0E; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="brand-system.jsx"></script>

<script type="text/babel">

const Mono = ({ children, style = {} }) =>
<span style={{ fontFamily: CL2.fontMono, fontSize: 11, letterSpacing: 1.6, textTransform: 'uppercase', opacity: 0.6, ...style }}>{children}</span>;


function Cover() {
  return (
    <section style={{ background: CL2.paper, padding: '80px 96px 96px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between' }}>
        <Mono>Checklist² · Logo + Color</Mono>
        <Mono>v1.0 · 2026</Mono>
      </div>
      <div style={{ marginTop: 64 }}>
        <CL2Mark s={132} bg={CL2.paper} />
        <h1 style={{ fontFamily: CL2.fontHead, fontWeight: 800, fontSize: 156, letterSpacing: -7, lineHeight: 0.86, margin: '36px 0 0', display: 'inline-flex', alignItems: 'flex-start' }}>
          <span>Checklist</span>
          <span style={{ color: CL2.accent, fontWeight: 900, fontSize: 84, marginTop: -12, marginLeft: 6, letterSpacing: "-7px", lineHeight: "0.87", height: "74px" }}>2</span>
        </h1>
        <div style={{ fontFamily: CL2.fontHead, fontSize: 21, fontWeight: 500, marginTop: 24, maxWidth: 720, lineHeight: 1.5, color: CL2.inkSoft }}>
          The mark is two solid sports cards, offset. The wordmark is bold Inter Tight with a red ² superscript. One accent. One ratio. Hard 90° corners.
        </div>
      </div>
    </section>);

}

function LogoBlock() {
  return (
    <section style={{ background: CL2.paper, padding: '80px 96px', borderTop: `1px solid ${CL2.fog}` }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 24, marginBottom: 56 }}>
        <Mono>01</Mono>
        <h2 style={{ fontFamily: CL2.fontHead, fontWeight: 800, fontSize: 56, letterSpacing: -1.6, margin: 0, textTransform: 'uppercase' }}>Logo</h2>
      </div>

      {/* Light + dark lockup */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24 }}>
        <div style={{ background: CL2.paper, padding: 56, border: `1px solid ${CL2.fog}` }}>
          <Mono style={{ display: 'block', marginBottom: 32 }}>Primary · paper</Mono>
          <CL2Lockup size={66} bg={CL2.paper} />
        </div>
        <div style={{ background: CL2.ink, padding: 56 }}>
          <Mono style={{ display: 'block', marginBottom: 32, color: CL2.paper, opacity: 0.65 }}>Reversed · ink</Mono>
          <CL2Lockup size={66} ink={CL2.paper} accent={CL2.accent} bg={CL2.ink} />
        </div>
      </div>

      {/* Mark anatomy */}
      <div style={{ marginTop: 24, background: CL2.paperDeep, padding: 56, border: `1px solid ${CL2.fog}`, display: 'grid', gridTemplateColumns: '260px 1fr', gap: 56, alignItems: 'center' }}>
        <CL2Mark s={220} bg={CL2.paperDeep} />
        <ul style={{ fontFamily: CL2.fontBody, fontSize: 15, lineHeight: 1.8, listStyle: 'none', padding: 0, margin: 0, color: CL2.inkSoft }}>
          <li><b style={{ color: CL2.ink }}>Card ratio</b> · 2.5 : 3.5 — actual sports-card proportion.</li>
          <li><b style={{ color: CL2.ink }}>Two cards</b> · the duplicate IS the "squared." Never single.</li>
          <li><b style={{ color: CL2.ink }}>Equal reveals</b> · back card shows equal strips top + right.</li>
          <li><b style={{ color: CL2.ink }}>Sharp 90°</b> · no rounded corners, ever.</li>
          <li><b style={{ color: CL2.ink }}>Front = ink, back = accent</b> · never swap.</li>
        </ul>
      </div>

      {/* Avatar / app icons */}
      <div style={{ marginTop: 24, background: CL2.paper, padding: 56, border: `1px solid ${CL2.fog}` }}>
        <Mono style={{ display: 'block', marginBottom: 32 }}>Avatar · C² monogram · favicon · social · app icon</Mono>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20 }}>
          {[
          { theme: 'card', label: 'Card · primary' },
          { theme: 'dark', label: 'Dark · default' },
          { theme: 'light', label: 'Light · paper' },
          { theme: 'red', label: 'Red · accent' }].
          map((t) =>
          <div key={t.theme} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
              <CL2AppIcon s={180} theme={t.theme} />
              <Mono>{t.label}</Mono>
            </div>
          )}
        </div>

        {/* Size scale */}
        <div style={{ marginTop: 48, display: 'flex', alignItems: 'flex-end', gap: 28, paddingTop: 32, borderTop: `1px solid ${CL2.fog}` }}>
          {[128, 96, 64, 48, 32, 16].map((s) =>
          <div key={s} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
              <CL2AppIcon s={s} theme="dark" />
              <Mono>{s}px</Mono>
            </div>
          )}
        </div>
      </div>

      {/* Don't */}
      <div style={{ marginTop: 24, background: '#fff', padding: 56, border: `1px solid ${CL2.fog}` }}>
        <Mono style={{ display: 'block', marginBottom: 32 }}>Don't</Mono>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
          {[
          { label: 'Recolor the front card', el: <CL2Mark s={120} front="#1F6FEB" back={CL2.accent} bg="#fff" /> },
          { label: 'Swap front and back', el: <CL2Mark s={120} front={CL2.accent} back={CL2.ink} bg="#fff" /> },
          { label: 'Round the corners', el:
            <svg width="120" height="120" viewBox="0 0 120 120" style={{ display: 'block' }}>
                <rect x="34" y="22" width="42" height="60" rx="9" fill={CL2.accent} />
                <rect x="22" y="34" width="42" height="60" rx="9" fill={CL2.ink} />
              </svg>
          }].
          map((d, i) =>
          <div key={i}>
              <div style={{ position: 'relative', height: 180, display: 'flex', alignItems: 'center', justifyContent: 'center', background: CL2.paperDeep, border: `1px solid ${CL2.fog}` }}>
                {d.el}
                <svg style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }} preserveAspectRatio="none">
                  <line x1="6%" y1="6%" x2="94%" y2="94%" stroke={CL2.accent} strokeWidth="3" />
                </svg>
              </div>
              <Mono style={{ display: 'block', marginTop: 14 }}>{d.label}</Mono>
            </div>
          )}
        </div>
      </div>
    </section>);

}

function ColorBlock() {
  const swatches = [
  { name: 'Ink', hex: CL2.ink, role: 'Primary text · front card · UI structure' },
  { name: 'Paper', hex: CL2.paper, role: 'Default background · negative space' },
  { name: 'Card Red', hex: CL2.accent, role: 'Accent · back card · ² · CTAs' },
  { name: 'Ink Soft', hex: CL2.inkSoft, role: 'Body copy on paper' },
  { name: 'Paper Deep', hex: CL2.paperDeep, role: 'Section breaks · cards on paper' },
  { name: 'Red Deep', hex: CL2.accentDeep, role: 'Pressed states · alt accent' },
  { name: 'Slate', hex: CL2.slate, role: 'Secondary text · captions' },
  { name: 'Fog', hex: CL2.fog, role: 'Borders · dividers · disabled' }];

  const lights = ['#F1EDE4', '#E5E0D3', '#CFC8B8'];
  function rgb(hex) {
    const n = parseInt(hex.slice(1), 16);
    return `${n >> 16 & 255}, ${n >> 8 & 255}, ${n & 255}`;
  }
  return (
    <section style={{ background: CL2.paper, padding: '80px 96px 120px', borderTop: `1px solid ${CL2.fog}` }}>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 24, marginBottom: 16 }}>
        <Mono>02</Mono>
        <h2 style={{ fontFamily: CL2.fontHead, fontWeight: 800, fontSize: 56, letterSpacing: -1.6, margin: 0, textTransform: 'uppercase' }}>Color</h2>
      </div>
      <div style={{ fontFamily: CL2.fontHead, fontWeight: 500, fontSize: 19, color: CL2.inkSoft, maxWidth: 720, marginBottom: 48, lineHeight: 1.5 }}>
        One ink, one paper, one accent. Card Red is the only saturated color in the system — used for the back card, the ², CTAs, and key data.
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', border: `1px solid ${CL2.fog}` }}>
        {swatches.map((sw, i) => {
          const isLight = lights.includes(sw.hex);
          const right = (i + 1) % 4 !== 0;
          const bottom = i < 4;
          return (
            <div key={sw.name} style={{
              background: sw.hex, color: isLight ? CL2.ink : CL2.paper, padding: 24, height: 220,
              display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
              borderRight: right ? `1px solid ${CL2.fog}` : 'none',
              borderBottom: bottom ? `1px solid ${CL2.fog}` : 'none'
            }}>
              <div style={{ fontFamily: CL2.fontHead, fontWeight: 800, fontSize: 22, letterSpacing: -0.5 }}>{sw.name}</div>
              <div>
                <div style={{ fontFamily: CL2.fontMono, fontSize: 12, letterSpacing: 1.4, opacity: 0.78 }}>{sw.hex.toUpperCase()}</div>
                <div style={{ fontFamily: CL2.fontMono, fontSize: 11, letterSpacing: 1, opacity: 0.6, marginTop: 2 }}>RGB {rgb(sw.hex)}</div>
                <div style={{ fontFamily: CL2.fontBody, fontSize: 12, lineHeight: 1.45, marginTop: 10, opacity: 0.88 }}>{sw.role}</div>
              </div>
            </div>);

        })}
      </div>

      {/* Application strip — proves the palette in context */}
      <div style={{ marginTop: 24, display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
        <div style={{ background: CL2.ink, color: CL2.paper, padding: 32, minHeight: 200 }}>
          <Mono style={{ color: CL2.paper, opacity: 0.6 }}>Hero on ink</Mono>
          <div style={{ fontFamily: CL2.fontHead, fontWeight: 800, fontSize: 38, letterSpacing: -1.2, lineHeight: 1, marginTop: 24, textTransform: 'uppercase' }}>
            2024 Topps<br />Chrome
          </div>
          <div style={{ display: 'inline-block', marginTop: 24, background: CL2.accent, color: CL2.paper, padding: '10px 18px', fontFamily: CL2.fontHead, fontWeight: 800, fontSize: 13, letterSpacing: 1.4, textTransform: 'uppercase' }}>View Checklist →</div>
        </div>
        <div style={{ background: CL2.paperDeep, color: CL2.ink, padding: 32, minHeight: 200, border: `1px solid ${CL2.fog}` }}>
          <Mono>Data row</Mono>
          <div style={{ marginTop: 18, fontFamily: CL2.fontMono, fontSize: 13, lineHeight: 2, color: CL2.inkSoft }}>
            <div><span style={{ color: CL2.ink, fontWeight: 600 }}>#BS-12</span> · BASE</div>
            <div><span style={{ color: CL2.ink, fontWeight: 600 }}>#BS-12 RED</span> · <span style={{ color: CL2.accent }}>/99</span></div>
            <div><span style={{ color: CL2.ink, fontWeight: 600 }}>#BS-12 SUPER</span> · <span style={{ color: CL2.accent }}>1/1</span></div>
          </div>
        </div>
        <div style={{ background: CL2.accent, color: CL2.paper, padding: 32, minHeight: 200 }}>
          <Mono style={{ color: CL2.paper, opacity: 0.7 }}>Accent panel</Mono>
          <div style={{ fontFamily: CL2.fontHead, fontWeight: 800, fontSize: 38, letterSpacing: -1.2, lineHeight: 1, marginTop: 24, textTransform: 'uppercase' }}>
            One color.<br />Used well.
          </div>
        </div>
      </div>
    </section>);

}

function App() {
  return (
    <div style={{ background: CL2.paper, minHeight: '100vh' }}>
      <Cover />
      <LogoBlock />
      <ColorBlock />
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
