<!doctype html>

<style>
  html, body { margin:0; padding:0; background:#E8E5DC; font-family: Inter, system-ui, sans-serif; color:#0F0F0E; }
  .wrap { max-width: 1320px; margin: 0 auto; padding: 32px 16px 80px; }
  h1 { font-family: "Inter Tight", Inter, sans-serif; font-size: 28px; font-weight: 600; letter-spacing:-0.6px; margin: 0 0 6px; }
  .lede { color:#6B6757; font-size: 14px; margin: 0 0 28px; }
  .group { margin: 40px 0 16px; padding: 8px 0; border-bottom: 1px solid #D7D2C3; }
  .group h2 { font-family:"Inter Tight"; font-weight:600; font-size:18px; margin:0; letter-spacing:-0.3px; }
  .row { display:flex; gap:24px; align-items:flex-start; flex-wrap:wrap; margin-top:18px; }
  .frame { background:#fff; border:1px solid #D7D2C3; }
  .label { font-family: ui-monospace, "JetBrains Mono", Menlo, monospace; font-size:10px; letter-spacing:1.6px; color:#8A8677; font-weight:600; margin: 0 0 6px; text-transform: uppercase; }
  .desktop { width:1280px; max-width:100%; overflow:auto; }
  .mobile { width: 402px; }
</style>
</head>

<div id="root"></div>
