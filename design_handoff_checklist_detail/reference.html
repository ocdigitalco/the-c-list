<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Reference — Checklist Detail D (web + mobile)</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#E8E5DC; font-family: Inter, system-ui, sans-serif; }
  .scene { padding:32px; display:flex; gap:32px; flex-wrap:wrap; align-items:flex-start; }
  .scene > .web { flex:0 0 auto; box-shadow:0 30px 60px rgba(0,0,0,0.18); border-radius:12px; overflow:hidden; }
  .phones { display:flex; gap:24px; align-items:flex-start; }
  h2.section { font-family:"Inter Tight"; font-weight:600; font-size:14px; letter-spacing:1.4px; text-transform:uppercase; color:#6B6757; margin:0 0 16px; padding:0 8px; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="reference/checklist-detail-data.js"></script>
<script type="text/babel" src="reference/ui-atoms.jsx"></script>
<script type="text/babel" src="reference/checklist-detail-D.jsx"></script>
<script type="text/babel" src="reference/checklist-detail-D-mobile.jsx"></script>

<script type="text/babel" data-presets="react">
function Phone({ children }) {
  return (
    <div style={{
      width: 402, height: 874, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{ position:'absolute', inset:0, overflow:'auto' }}>{children}</div>
    </div>
  );
}

function App() {
  return (
    <div className="scene">
      <div>
        <h2 className="section">Web — 1280px</h2>
        <div className="web"><window.OptionD/></div>
      </div>
      <div>
        <h2 className="section">Mobile — 402×874</h2>
        <div className="phones">
          <Phone><window.OptionDMobile/></Phone>
          <Phone><window.OptionDMobileOpen/></Phone>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
